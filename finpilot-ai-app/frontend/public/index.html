<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FinPilot AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #0b1220; color: #eef2ff; }
    .card { max-width: 900px; margin: 0 auto; background: #111827; padding: 24px; border-radius: 16px; }
    h1 { margin-top: 0; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; background: #1f2937; }
    .chat { margin-top: 24px; padding: 16px; border: 1px solid #334155; border-radius: 12px; }
    input, button { padding: 10px; border-radius: 8px; border: none; }
    input { width: 70%; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">FinPilot Advisor</span>
    <h1>FinPilot AI</h1>
    <p>Production-grade AI Wealth Management Platform starter.</p>
    <div class="chat">
      <p><strong>Starter Chat UI Placeholder</strong></p>
      <input placeholder="Ask about portfolio, risk, or goals" />
      <button>Send</button>
    </div>
  </div>
</body>
</html>
