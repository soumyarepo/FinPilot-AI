apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finpilot-stage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/finpilot-ai-app.git
    targetRevision: main
    path: helm/finpilot
    helm:
      valueFiles:
        - ../../../../finpilot-ai-gitops/helm-values/stage/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: finpilot-stage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
