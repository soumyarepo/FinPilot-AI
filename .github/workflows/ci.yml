name: FinPilot AI CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  app-build:
    name: Build Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: finpilot-ai-app/frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug files
        run: |
          pwd
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build