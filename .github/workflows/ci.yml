name: FinPilot AI CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checkout:
    name: Checkout Code
    runs-on: ubuntu-latest

    steps:
      - name: Print Stage Start
        run: |
          echo "===== STAGE 1 - CHECKOUT STARTED ====="

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Repository Structure
        run: |
          echo "Listing files in repository"
          pwd
          ls -R

      - name: Print Stage End
        run: |
          echo "===== STAGE 1 - CHECKOUT COMPLETED ====="

  build:
    name: Build Frontend Application
    runs-on: ubuntu-latest
    needs: checkout

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Stage Start
        run: |
          echo "===== STAGE 2 - BUILD STARTED ====="

      - name: Verify Repository Structure
        run: |
          echo "Current directory"
          pwd
          echo "Repository files"
          ls -R

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        working-directory: ./finpilot-ai-app/frontend
        run: |
          echo "Installing dependencies"
          npm install

      - name: Build Application
        working-directory: ./finpilot-ai-app/frontend
        run: |
          echo "Building application"
          npm run build

      - name: Print Stage End
        run: |
          echo "===== STAGE 2 - BUILD COMPLETED ====="

  test:
    name: Unit Testing
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Stage Start
        run: |
          echo "===== STAGE 3 - TEST STARTED ====="

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        working-directory: ./finpilot-ai-app/frontend
        run: |
          echo "Installing dependencies for testing"
          npm install

      - name: Run Unit Tests
        working-directory: ./finpilot-ai-app/frontend
        run: |
          echo "Running unit tests"
          npm test

      - name: Print Stage End
        run: |
          echo "===== STAGE 3 - TEST COMPLETED ====="